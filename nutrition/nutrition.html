<style>
  :root {
    --bg: #f4f1eb;

    --accent: #005a8c;
    --accent2: #0072b0;
    --accent-light: #e8f2f9;
    --tier1: #1a4a1a;
    --tier1-bg: #f0f6f0;
    --tier2: #4a3a00;
    --tier2-bg: #fdf8ee;
    --tier-warn: #8c2a2a;
    --tier-warn-bg: #fdf0f0;
    --shadow: 0 2px 10px rgba(0,0,0,0.06);
    --shadow-hover: 0 4px 20px rgba(0,0,0,0.1);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    padding: 0 16px 60px;
  }

  /* ─── HEADER ─── */
  header {
    max-width: 1000px;
    margin: 0 auto;
    padding: 8px 0 14px;
    border-bottom: 2px solid var(--ink);
    margin-bottom: 10px;
    display: flex;
    align-items: baseline;
    justify-content: space-between;
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.45rem;
    font-weight: 400;
    letter-spacing: -0.01em;
    color: var(--ink);
  }

  header h1 span { color: var(--accent); }

  .header-doi-link {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.78rem;
    font-weight: 400;
    color: rgba(26,23,20,0.5);
    text-decoration: none;
    transition: color 0.15s;
    white-space: nowrap;
  }
  .header-doi-link:hover { color: var(--accent); }

  .header-sub {
    max-width: 1000px;
    margin: 8px auto 16px;
    font-size: 0.82rem;
    color: var(--ink3);
    font-weight: 300;
    line-height: 1.5;
  }

  /* ─── MAIN ─── */
  main {
    max-width: 1000px;
    margin: 0 auto;
  }

  /* ─── GROUP CARD ─── */
  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 6px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .group-card:hover { box-shadow: var(--shadow-hover); }

  .group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 10px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    transition: background 0.15s;
  }
  .group-header:hover { background: var(--surface2); }

  .group-arrow {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px;
    background: var(--surface2);
    color: var(--ink2);
    font-size: 0.65rem;
    transition: transform 0.2s, background 0.15s;
    flex-shrink: 0;
  }
  .group-card.open .group-arrow {
    transform: rotate(90deg);
    background: var(--accent-light);
    color: var(--accent);
  }

  .group-number {
    font-family: 'DM Serif Display', serif;
    font-size: 0.75rem;
    color: var(--ink3);
    flex-shrink: 0;
  }

  .group-title {
    font-family: 'DM Serif Display', serif;
    font-size: 0.95rem;
    color: var(--ink);
    flex: 1;
  }

  .group-subtitle {
    font-size: 0.72rem;
    color: var(--ink3);
    font-style: italic;
  }

  .group-count {
    font-size: 0.7rem;
    color: var(--ink3);
    white-space: nowrap;
  }

  /* ─── GROUP BODY ─── */
  .group-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .group-card.open .group-body { display: block; }

  /* ─── SUBGROUP ─── */
  .subgroup {
    border-bottom: 1px solid var(--border);
  }
  .subgroup:last-child { border-bottom: none; }

  .subgroup-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px 8px 24px;
    cursor: pointer;
    user-select: none;
    background: var(--surface2);
    transition: background 0.15s;
  }
  .subgroup-header:hover { background: #f0ece4; }

  .subgroup-arrow {
    width: 18px; height: 18px;
    display: flex; align-items: center; justify-content: center;
    color: var(--ink3);
    font-size: 0.6rem;
    transition: transform 0.2s;
    flex-shrink: 0;
  }
  .subgroup.open .subgroup-arrow { transform: rotate(90deg); }

  .subgroup-label {
    font-family: 'DM Sans', sans-serif;
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    color: var(--ink2);
    flex: 1;
  }

  .subgroup-count {
    font-size: 0.68rem;
    color: var(--ink3);
  }

  .subgroup-body {
    display: none;
  }
  .subgroup.open .subgroup-body { display: block; }

  /* ─── TIER LABEL ─── */
  .tier-label {
    font-size: 0.68rem;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    padding: 6px 24px 3px 32px;
    color: var(--ink3);
    border-bottom: 1px solid #ede8df;
  }
  .tier-label.tier-1 { color: var(--tier1); background: var(--tier1-bg); }
  .tier-label.tier-2 { color: var(--tier2); background: var(--tier2-bg); }
  .tier-label.tier-warn { color: var(--tier-warn); background: var(--tier-warn-bg); }

  /* ─── ITEM ROW ─── */
  .item-row {
    display: flex;
    align-items: baseline;
    gap: 12px;
    padding: 7px 24px 7px 32px;
    border-bottom: 1px solid #f0ece4;
    transition: background 0.1s;
  }
  .item-row:last-child { border-bottom: none; }
  .item-row:hover { background: #faf8f4; }

  .item-row.tier-1-item { border-left: 3px solid #a8c8a8; }
  .item-row.tier-2-item { border-left: 3px solid #d4b84a; }
  .item-row.tier-warn-item { border-left: 3px solid #cc4444; }
  .item-row.no-tier { border-left: 3px solid transparent; }

  .item-name {
    font-size: 0.84rem;
    font-weight: 500;
    color: var(--ink);
    min-width: 200px;
    flex-shrink: 0;
  }

  .item-desc {
    font-size: 0.79rem;
    color: var(--ink2);
    line-height: 1.5;
    flex: 1;
  }

  .item-desc strong {
    color: var(--ink);
    font-weight: 500;
  }

  /* ─── FOOTER ─── */
  .page-footer {
    max-width: 1000px;
    margin: 32px auto 0;
    padding: 16px 0;
    border-top: 1px solid var(--border);
    font-size: 0.78rem;
    color: var(--ink3);
    line-height: 1.6;
  }

  @media (max-width: 600px) {
    header { flex-direction: column; gap: 6px; }
    .item-row { flex-direction: column; gap: 3px; }
    .item-name { min-width: unset; }
  }
</style>

function countItems(group) {
  return group.subgroups.reduce((a, sg) =>
    a + sg.tiers.reduce((b, t) => b + t.items.length, 0), 0);
}

function render() {
  const container = document.getElementById('groups-container');

  DATA.forEach(group => {
    const total = countItems(group);
    const card = document.createElement('div');
    card.className = 'group-card';

    // Group header
    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <div class="group-arrow">▶</div>
      <div class="group-number">${group.number}</div>
      <div class="group-title">${group.title}</div>
      <div class="group-subtitle">${group.subtitle}</div>
      <div class="group-count">${total} items</div>
    `;
    header.addEventListener('click', () => card.classList.toggle('open'));
    card.appendChild(header);

    // Group body
    const body = document.createElement('div');
    body.className = 'group-body';

    group.subgroups.forEach(sg => {
      const sgCount = sg.tiers.reduce((a, t) => a + t.items.length, 0);
      const subgroup = document.createElement('div');
      subgroup.className = 'subgroup';

      // Subgroup header
      const sgHeader = document.createElement('div');
      sgHeader.className = 'subgroup-header';
      sgHeader.innerHTML = `
        <div class="subgroup-arrow">▶</div>
        <div class="subgroup-label">${sg.label}</div>
        <div class="subgroup-count">${sgCount} items</div>
      `;
      sgHeader.addEventListener('click', () => subgroup.classList.toggle('open'));
      subgroup.appendChild(sgHeader);

      // Subgroup body
      const sgBody = document.createElement('div');
      sgBody.className = 'subgroup-body';

      sg.tiers.forEach(tier => {
        // Tier label (if present)
        if (tier.label) {
          const tl = document.createElement('div');
          tl.className = 'tier-label ' + (tier.cls || '');
          tl.textContent = tier.label;
          sgBody.appendChild(tl);
        }

        // Items
        tier.items.forEach(item => {
          const row = document.createElement('div');
          const tierCls = tier.cls === 'tier-1' ? 'tier-1-item'
                        : tier.cls === 'tier-2' ? 'tier-2-item'
                        : tier.cls === 'tier-warn' ? 'tier-warn-item' : 'no-tier';
          row.className = 'item-row ' + tierCls;
          row.innerHTML = `
            <div class="item-name">${item.name}</div>
            <div class="item-desc">${item.desc}</div>
          `;
          sgBody.appendChild(row);
        });
      });

      subgroup.appendChild(sgBody);
      body.appendChild(subgroup);
    });

    card.appendChild(body);
    container.appendChild(card);
  });
}

render();

// ── Render Treatments (flat: no subgroup layer) ──
function renderTreatments() {
  const container = document.getElementById('treatments-container');

  TREATMENTS.forEach(group => {
    const total = group.tiers.reduce((a, t) => a + t.items.length, 0);
    const card = document.createElement('div');
    card.className = 'group-card';

    // Group header
    const header = document.createElement('div');
    header.className = 'group-header';
    header.innerHTML = `
      <div class="group-arrow">▶</div>
      <div class="group-number">${group.number}</div>
      <div class="group-title">${group.title}</div>
      <div class="group-subtitle">${group.subtitle}</div>
      <div class="group-count">${total} items</div>
    `;
    header.addEventListener('click', () => card.classList.toggle('open'));
    card.appendChild(header);

    // Group body — tiers directly, no subgroup wrapper
    const body = document.createElement('div');
    body.className = 'group-body';

    group.tiers.forEach(tier => {
      if (tier.label) {
        const tl = document.createElement('div');
        tl.className = 'tier-label ' + (tier.cls || '');
        tl.textContent = tier.label;
        body.appendChild(tl);
      }

      tier.items.forEach(item => {
        const row = document.createElement('div');
        const tierCls = tier.cls === 'tier-1' ? 'tier-1-item'
                      : tier.cls === 'tier-2' ? 'tier-2-item'
                      : tier.cls === 'tier-warn' ? 'tier-warn-item' : 'no-tier';
        row.className = 'item-row ' + tierCls;
        row.innerHTML = `
          <div class="item-name">${item.name}</div>
          <div class="item-desc">${item.desc}</div>
        `;
        body.appendChild(row);
      });
    });

    card.appendChild(body);
    container.appendChild(card);
  });
}

renderTreatments();
