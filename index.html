<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Awesome Reference Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f3ef;
      --surface:   #ffffff;
      --border:    #d8d5cc;
      --accent:    #005a8c;
      --accent2:   #c8440a;
      --text:      #1a1a18;
      --muted:     #888880;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      padding: 0 16px 40px;
    }

    header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 20px 0 14px;
      border-bottom: 2px solid var(--text);
      margin-bottom: 20px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 22px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header p {
      margin-top: 4px;
      font-size: 13px;
      color: var(--muted);
      font-weight: 300;
    }

    .lookup-box {
      max-width: 1400px;
      margin: 0 auto 16px;
      display: flex;
      gap: 10px;
    }

    .lookup-box textarea {
      flex: 1;
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
      resize: none;
      height: 80px;
      line-height: 1.5;
      overflow-y: auto;
    }

    .lookup-box textarea:focus {
      border-color: var(--accent);
    }

    .lookup-box textarea::placeholder {
      color: var(--muted);
    }

    /* Export CSV button */
    #exportBtn {
      display: none;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      background: #2a7a2a;
      color: #fff;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    #exportBtn:hover { background: #1e5c1e; }
    #exportBtn:disabled { background: var(--muted); cursor: not-allowed; }

    #clearBtn {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 8px 18px;
      background: #8c2a2a;
      color: #fff;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      white-space: nowrap;
    }
    #clearBtn:hover { background: #6b1f1f; }

    #helpBtn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 22px;
      height: 22px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      line-height: 1;
      padding: 0;
      transition: background 0.15s;
    }
    #helpBtn:hover { background: #004470; }

    .lookup-box button {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .lookup-box button:hover { background: #004470; }
    .lookup-box button:disabled { background: var(--muted); cursor: not-allowed; }

    #status {
      max-width: 1400px;
      margin: 0 auto 20px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }

    #status.error { color: var(--accent2); }

    #results {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Modal styles - reused from extension but as inline page sections */
    .result-section {
      background: var(--surface);
      border: 1.5px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .result-section-header {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      padding: 10px 16px;
      background: #f0f4f8;
      border-bottom: 1px solid var(--border);
    }

    .result-section-body {
      padding: 16px;
    }

    /* Inject modal HTML from lookup.js into #results */
    #results a { color: var(--accent); }
    #results a:hover { color: var(--accent2); }

    /* Override modal popup styles for inline display */
    #results [style*="position: fixed"],
    #results [style*="position:fixed"] {
      position: static !important;
    }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .lookup-box { flex-direction: column; }
      .lookup-box button { width: 100%; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>Awesome Reference Lookup</h1>
    <p>Enter a DOI (up to 15, separated by commas), a single ISSN, ISBN, ORCID, or PMID to retrieve article metadata, metrics, and more. Any other text is a WorldCat search (prefix with author: or title: to narrow).</p>
  </header>

  <div class="lookup-box">
    <textarea id="doiInput"
      placeholder="e.g. 10.1038/s41586-025-09227-0 — DOIs, ISSN, ISBN, ORCID, PMID, or search WorldCat"
      autocomplete="off" spellcheck="false"></textarea>
    <button id="lookupBtn" onclick="runLookup()">Look Up</button>
  </div>
  <div style="max-width:1400px; margin: 0 auto 8px; display:flex; align-items:center; gap:10px;">
    <button id="helpBtn" onclick="DOIHelp.showHelpModal()" title="Help">?</button>
    <button id="exportBtn" onclick="exportCSV()">Export CSV</button>
    <button id="clearBtn" onclick="clearList()">Clear list</button>
    <div id="status"></div>
  </div>
  <div id="results"></div>

  <!-- Footer removed — attribution now appears on each result card -->

  <script src="helpContent.js"></script>
  <script src="doiLookup.js"></script>
  <script src="pubmedLookup-nonmodule.js"></script>
  <script src="lookup.js"></script>
  <script>
    const input   = document.getElementById('doiInput');
    const btn     = document.getElementById('lookupBtn');
    const status  = document.getElementById('status');
    const results = document.getElementById('results');
    const exportBtn = document.getElementById('exportBtn');
    const clearBtn  = document.getElementById('clearBtn');

    // Store all result data objects for CSV export
    let _allResults = [];

    // Enter = submit, Shift+Enter = newline
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        runLookup();
      }
    });

    // Check for ?doi= query parameter on page load — supports comma-separated list
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const doiParam = params.get('doi');
      if (doiParam) {
        input.value = decodeURIComponent(doiParam);
        runLookup();
      }
    });

    // Input pattern helpers
    const ORCID_RE  = /^\d{4}-\d{4}-\d{4}-\d{3}[\dX]$/i;
    const ISSN_RE   = /^\d{4}-\d{3}[\dX]$/i;
    const PMID_RE   = /^\d{1,9}$/;
    const ISBN13_RE  = /^(978|979)\d{10}$/;
    const ISBN10_RE  = /^\d{9}[\dX]$/i;
    const DOI_RE    = /^10\.\d{4,}\/\S+$/i;
    const DOI_URL_RE = /^https?:\/\/(dx\.)?doi\.org\/(10\.\d{4,}\/\S+)$/i;
    const ORCID_URL_RE = /^https?:\/\/orcid\.org\/(\d{4}-\d{4}-\d{4}-\d{3}[\dX])$/i;

    function extractCleanDoi(s) {
      // Strip common prefixes like "DOI " or "DOI:" or "doi: "
      const cleaned = s.replace(/^doi[:\s]+/i, '').trim();
      const urlMatch = cleaned.match(DOI_URL_RE);
      if (urlMatch) return urlMatch[2];
      if (DOI_RE.test(cleaned)) return cleaned;
      return null;
    }

    function extractOrcid(s) {
      // Strip common prefixes like "ORCID " or "ORCID:" or "orcid: "
      const cleaned = s.replace(/^orcid[:\s]+/i, '').trim();
      const urlMatch = cleaned.match(ORCID_URL_RE);
      if (urlMatch) return urlMatch[1];
      if (ORCID_RE.test(cleaned)) return cleaned;
      return null;
    }

    function extractIssn(s) {
      // Strip common prefixes like "ISSN " or "ISSN:"
      const cleaned = s.replace(/^issn[:\s]+/i, '').trim();
      if (ISSN_RE.test(cleaned)) return cleaned.toUpperCase();
      return null;
    }

    function extractPmid(s) {
      // Strip common prefixes like "PMID " or "PMID:"
      const cleaned = s.replace(/^pmid[:\s]+/i, '').trim();
      if (PMID_RE.test(cleaned)) return cleaned;
      return null;
    }

    function extractIsbn(s) {
      // Strip common prefixes like "ISBN " or "ISBN:" or "ISBN-13:"
      const cleaned = s.replace(/^isbn[-\s]*(?:1[03])?[:\s]*/i, '').trim();
      // Remove hyphens/spaces for validation
      const digits = cleaned.replace(/[-\s]/g, '');
      if (ISBN13_RE.test(digits)) return digits;
      if (ISBN10_RE.test(digits)) return digits;
      return null;
    }

    async function runLookup() {
      const raw = input.value.trim();
      if (!raw) {
        setStatus('Please enter a DOI, ISSN, ISBN, ORCID, PMID, or search text.', true);
        return;
      }

      // Check for ORCID (single input only)
      const orcid = extractOrcid(raw);
      if (orcid) {
        setStatus('Opened ORCID profile in a new tab.');
        window.open(`https://orcid.org/${orcid}`, '_blank');
        return;
      }

      // Check for ISSN (single input only)
      const issn = extractIssn(raw);
      if (issn) {
        setStatus('Opened ISSN portal in a new tab.');
        window.open(`https://portal.issn.org/resource/ISSN/${issn}`, '_blank');
        return;
      }

      // Check for PMID (single input only — pure digits)
      const pmid = extractPmid(raw);
      if (pmid) {
        setStatus('Opened PubMed in a new tab.');
        window.open(`https://pubmed.ncbi.nlm.nih.gov/${pmid}/`, '_blank');
        return;
      }

      // Check for ISBN (single input only)
      const isbn = extractIsbn(raw);
      if (isbn) {
        setStatus('Opened WorldCat in a new tab.');
        window.open(`https://search.worldcat.org/isbn/${isbn}`, '_blank');
        return;
      }

      // Parse comma-separated DOIs, strip whitespace, dedupe, cap at 10
      const entries = [...new Set(
        raw.split(',')
           .map(d => d.trim())
           .filter(Boolean)
      )].slice(0, 15);

      if (entries.length === 0) {
        setStatus('Please enter a DOI, ISSN, ISBN, ORCID, PMID, or search text.', true);
        return;
      }

      // Validate every entry is a DOI
      const dois = [];
      for (const entry of entries) {
        const clean = extractCleanDoi(entry);
        if (!clean) {
          // Not a recognized identifier — fall through to WorldCat search
          // Check for author:/au: or title:/ti: prefixes
          let wcQuery = raw;
          const authorMatch = raw.match(/^(?:author|au)[:\s]+(.+)$/i);
          const titleMatch  = raw.match(/^(?:title|ti)[:\s]+(.+)$/i);
          if (authorMatch) {
            wcQuery = `au:${authorMatch[1].trim()}`;
          } else if (titleMatch) {
            wcQuery = `ti:${titleMatch[1].trim()}`;
          }
          setStatus('Opened WorldCat search in a new tab.');
          window.open(`https://search.worldcat.org/search?q=${encodeURIComponent(wcQuery)}`, '_blank');
          return;
        }
        dois.push(clean);
      }

      // Filter out DOIs already on the page
      const existingDois = _allResults.map(r => r._doi);
      const newDois = dois.filter(d => !existingDois.includes(d));

      if (newDois.length === 0) {
        setStatus('All DOIs already in group.');
        return;
      }

      // Combine existing + new DOIs and update URL for shareability
      const allDois = [...newDois, ...existingDois];
      const nocache = new URLSearchParams(window.location.search).has('nocache');
      history.replaceState(null, '', `?doi=${encodeURIComponent(allDois.join(','))}${nocache ? '&nocache' : ''}`);

      btn.disabled = true;
      window.__xdoiResult = null;

      const total = newDois.length;
      let completed = 0;

      for (const doi of newDois) {
        setStatus(`<span class="spinner"></span>Looking up ${completed + 1} of ${total}: ${doi}`);
        try {
          await handleDOILookup(doi);
        } catch (err) {
          // Show error card for this DOI but continue with the rest
          const errDiv = document.createElement('div');
          errDiv.style.cssText = 'background:white; padding:25px; border:1.5px solid #d8d5cc; margin-bottom:16px; color:red;';
          errDiv.textContent = `Error looking up ${doi}: ${err.message}`;
          results.appendChild(errDiv);
          console.error(err);

          // Set error result for first DOI if not yet set
          if (completed === 0 && !window.__xdoiResult) {
            window.__xdoiResult = { error: true, message: err.message, doi: doi };
          }
        }

        // After first DOI completes, populate __xdoiResult for extension consumption
        if (completed === 0 && !window.__xdoiResult && _allResults.length > 0) {
          window.__xdoiResult = curateXdoiResult(_allResults[0]);
        }

        completed++;
      }

      updateDoiList();
      btn.disabled = false;

      // Show export button if we have results
      if (_allResults.length > 0) {
        updateExportBtn();
        exportBtn.style.display = 'block';
      }
    }

    function updateExportBtn() {
      const total = _allResults.length;
      exportBtn.disabled = total === 0;
      exportBtn.textContent = `Export CSV (${total})`;
    }

    function updateDoiList() {
      const dois = _allResults.map(r => r._doi);
      input.value = dois.join(', ');
      setStatus('');
    }

    function updateCardNumbers() {
      const cards = results.querySelectorAll('[id^="card-"]');
      const total = cards.length;
      cards.forEach((card, i) => {
        const numEl = card.querySelector('.card-number');
        if (numEl) numEl.textContent = `${i + 1} of ${total}`;
      });
    }

    function updateUrlFromResults() {
      const dois = _allResults.map(r => r._doi);
      const nocache = new URLSearchParams(window.location.search).has('nocache');
      if (dois.length > 0) {
        history.replaceState(null, '', `?doi=${encodeURIComponent(dois.join(','))}${nocache ? '&nocache' : ''}`);
      } else {
        history.replaceState(null, '', window.location.pathname);
      }
    }

    function onCardCheckChange(doi) {
      // Remove the result from data
      _allResults = _allResults.filter(r => r._doi !== doi);
      // Remove the card from DOM
      const cardId = `card-${doi.replace(/[^a-zA-Z0-9]/g, '-')}`;
      const card = document.getElementById(cardId);
      if (card) card.remove();
      // Update everything
      updateCardNumbers();
      updateExportBtn();
      updateDoiList();
      updateUrlFromResults();
      if (_allResults.length === 0) {
        exportBtn.style.display = 'none';
      }
    }

    function clearList() {
      // Keep only the first card (newest, at top of page)
      if (_allResults.length <= 1) return;
      const keepResult = _allResults[0];
      const keepDoi = keepResult._doi;
      const keepCardId = `card-${keepDoi.replace(/[^a-zA-Z0-9]/g, '-')}`;
      // Remove all other cards from DOM
      const cards = results.querySelectorAll('[id^="card-"]');
      cards.forEach(card => {
        if (card.id !== keepCardId) card.remove();
      });
      // Keep only the first result
      _allResults = [keepResult];
      // Update everything
      updateCardNumbers();
      updateExportBtn();
      updateDoiList();
      updateUrlFromResults();
    }

    function exportCSV() {
      if (_allResults.length === 0) return;

      const cols = [
        'DOI','Title','Journal','Publisher','Year','Volume','Issue','Pages','Type','ISSN',
        'First Author','First Author ORCID','Last Author','Last Author ORCID',
        'Citations (CrossRef)','Citations (OpenAlex)','Citations (Sem Sch)','RCR','SJR',
        'DOAJ','PubMed','Free PDF URL','Funders','Grant Numbers','Grant Source'
      ];

      const escape = v => {
        if (v === null || v === undefined) return '';
        const s = String(v);
        return s.includes(',') || s.includes('\"') || s.includes('\n')
          ? `"${s.replace(/"/g, '""')}"` : s;
      };

      const rows = _allResults.map(r => [
        r.doiOrgDoi || r._doi || '',
        r.doiOrgTitle || r.raTitle || '',
        r.doiOrgJournal || r.raJournal || '',
        r.doiOrgPublisher || r.raPublisher || '',
        r.doiOrgPublishedDate || r.raPublishedOnline || r.raIssued || '',
        r.doiOrgVolume || r.raVolume || '',
        r.doiOrgIssue || r.raIssue || '',
        r.doiOrgPages || r.raPage || '',
        r.doiOrgType || r.raType || '',
        r.doiOrgIssn || r.raIssn || '',
        r._displayFirstAuthorName || '',
        r._displayFirstAuthorOrcid || '',
        r._displayLastAuthorName || '',
        r._displayLastAuthorOrcid || '',
        r.doiOrgCitationCount ?? r.raCitationCount ?? '',
        r._openAlexCitations ?? '',
        r._semSchCitations ?? '',
        r._iciteRcr ?? '',
        r._sjrScore || '',
        r._doajFound === true ? 'Yes' : r._doajFound === false ? 'No' : '',
        r.pubmedFound === true ? 'Yes' : r.pubmedFound === false ? 'No' : '',
        r._oaFreePdf || '',
        // Funders
        (() => { const g = r._resolvedGrants || []; if (!g.length) return ''; return [...new Set(g.map(x => x.agency).filter(Boolean))].join('; '); })(),
        // Grant Numbers
        (() => { const g = r._resolvedGrants || []; if (!g.length) return ''; return g.map(x => x.grantId).filter(Boolean).join('; '); })(),
        r._resolvedGrantsSource || '',
      ].map(escape).join(','));

      const csv = [cols.join(','), ...rows].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url  = URL.createObjectURL(blob);
      const a    = document.createElement('a');
      a.href     = url;
      a.download = `ref-lookup-${new Date().toISOString().slice(0,10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    function setStatus(msg, isError = false) {
      status.innerHTML = msg;
      status.className = isError ? 'error' : '';
    }

    // Build a flat summary object from the full result for extension consumption
    // Available at window.__xdoiResult after first DOI lookup completes
    function curateXdoiResult(r) {
      if (!r) return { error: true, message: 'No result data' };

      // Quality label (mirrors summary card logic)
      const sjr = r._sjrScore ? parseFloat(r._sjrScore) : null;
      const hasRetraction = r.pubmedIsRetractedPublication || false;
      let quality = sjr === null ? 'Unknown'
                  : sjr >= 3    ? 'High'
                  : sjr >= 0.8  ? 'Good'
                  : 'Low';
      if (hasRetraction) quality = 'Retracted';

      // Grants — flatten to simple strings
      const grants = r._resolvedGrants || [];
      const funders = [...new Set(grants.map(g => g.agency).filter(Boolean))].join('; ');
      const grantIds = grants.map(g => g.grantId).filter(Boolean).join('; ');

      return {
        error: false,
        doi:              r.doiOrgDoi || r._doi || '',
        title:            r.doiOrgTitle || r.raTitle || '',
        journal:          r.doiOrgJournal || r.raJournal || '',
        publisher:        r.doiOrgPublisher || r.raPublisher || '',
        year:             r.doiOrgPublishedDate || r.raPublishedOnline || r.raIssued || '',
        volume:           r.doiOrgVolume || r.raVolume || '',
        issue:            r.doiOrgIssue || r.raIssue || '',
        pages:            r.doiOrgPages || r.raPage || '',
        type:             r.doiOrgType || r.raType || '',
        issn:             r.doiOrgIssn || r.raIssn || '',
        ra:               r.doiOrgRa || '',
        language:         r.doiOrgLanguage || r.raLanguage || '',

        // Authors
        firstAuthor:      r._displayFirstAuthorName || '',
        firstAuthorOrcid: r._displayFirstAuthorOrcid || '',
        lastAuthor:       r._displayLastAuthorName || '',
        lastAuthorOrcid:  r._displayLastAuthorOrcid || '',
        authorCount:      r._displayAuthorCount || 0,

        // Citations
        citationsCrossref:  r.doiOrgCitationCount ?? r.raCitationCount ?? null,
        citationsOpenAlex:  r._openAlexCitations ?? null,
        citationsSemSch:    r._semSchCitations ?? null,
        citationsInfluential: r._semSchInfluential ?? null,
        citationsICite:     r._iciteCitations ?? null,
        rcr:                r._iciteRcr ?? null,

        // Journal metrics
        sjr:              r._sjrScore || null,
        sjrUrl:           r._sjrUrl || null,
        quality:          quality,

        // Open access / availability
        doajFound:        r._doajFound === true,
        doajApc:          r._doajApc || null,
        doajLicence:      r._doajLicence || null,
        freePdfUrl:       r._oaFreePdf || '',
        freePdfLabel:     r._oaLabel || '',

        // PubMed
        pubmedFound:      r.pubmedFound === true,
        pmid:             r.pubmedPMID || '',
        pmcid:            r.pubmedPMCID || '',
        medline:          r.pubmedIsMedline === true,
        preprint:         r.pubmedIsPreprint === true,
        retracted:        hasRetraction,
        hasCorrection:    r.pubmedHasCorrection === true,
        correctionPmid:   r.pubmedCorrectionPMID || '',
        retractionPmid:   r.pubmedRetractionPMID || '',

        // OpenAIRE
        oaPopularity:     r._oaPopularity || null,
        oaInfluence:      r._oaInfluence || null,
        oaImpulse:        r._oaImpulse || null,

        // Grants
        funders:          funders,
        grantIds:         grantIds,
        grantSource:      r._resolvedGrantsSource || '',

        // Abstract snippet
        abstract:         r.pubmedAbstract || r.raAbstract || '',

        // Timestamp
        lookupDate:       new Date().toISOString()
      };
    }
  </script>
</body>
</html>
