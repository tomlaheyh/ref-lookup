<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DOI Lookup</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #f4f3ef;
      --surface:   #ffffff;
      --border:    #d8d5cc;
      --accent:    #005a8c;
      --accent2:   #c8440a;
      --text:      #1a1a18;
      --muted:     #888880;
      --mono:      'IBM Plex Mono', monospace;
      --sans:      'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      font-weight: 300;
      min-height: 100vh;
      padding: 0 16px 60px;
    }

    header {
      max-width: 1400px;
      margin: 0 auto;
      padding: 48px 0 32px;
      border-bottom: 2px solid var(--text);
      margin-bottom: 40px;
    }

    header h1 {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 600;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    header p {
      margin-top: 8px;
      font-size: 14px;
      color: var(--muted);
      font-weight: 300;
    }

    .lookup-box {
      max-width: 1400px;
      margin: 0 auto 40px;
      display: flex;
      gap: 10px;
    }

    .lookup-box input {
      flex: 1;
      font-family: var(--mono);
      font-size: 14px;
      padding: 12px 16px;
      border: 1.5px solid var(--border);
      background: var(--surface);
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }

    .lookup-box input:focus {
      border-color: var(--accent);
    }

    .lookup-box input::placeholder {
      color: var(--muted);
    }

    .lookup-box button {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      padding: 12px 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: background 0.15s;
      white-space: nowrap;
    }

    .lookup-box button:hover { background: #004470; }
    .lookup-box button:disabled { background: var(--muted); cursor: not-allowed; }

    #status {
      max-width: 1400px;
      margin: 0 auto 20px;
      font-family: var(--mono);
      font-size: 13px;
      color: var(--muted);
      min-height: 20px;
    }

    #status.error { color: var(--accent2); }

    #results {
      max-width: 1400px;
      margin: 0 auto;
    }

    /* Modal styles - reused from extension but as inline page sections */
    .result-section {
      background: var(--surface);
      border: 1.5px solid var(--border);
      margin-bottom: 16px;
      overflow: hidden;
    }

    .result-section-header {
      font-family: var(--mono);
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      color: var(--accent);
      padding: 10px 16px;
      background: #f0f4f8;
      border-bottom: 1px solid var(--border);
    }

    .result-section-body {
      padding: 16px;
    }

    /* Inject modal HTML from lookup.js into #results */
    #results a { color: var(--accent); }
    #results a:hover { color: var(--accent2); }

    /* Override modal popup styles for inline display */
    #results [style*="position: fixed"],
    #results [style*="position:fixed"] {
      position: static !important;
    }

    footer {
      max-width: 1400px;
      margin: 60px auto 0;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      font-size: 12px;
      color: var(--muted);
      display: flex;
      justify-content: space-between;
    }

    footer a { color: var(--muted); }

    /* Loading spinner */
    .spinner {
      display: inline-block;
      width: 12px;
      height: 12px;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      margin-right: 8px;
      vertical-align: middle;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    @media (max-width: 600px) {
      .lookup-box { flex-direction: column; }
      .lookup-box button { width: 100%; }
      header h1 { font-size: 22px; }
    }
  </style>
</head>
<body>

  <header>
    <h1>DOI Lookup</h1>
    <p>Enter a DOI to retrieve article metadata, metrics, author information and external links.</p>
  </header>

  <div class="lookup-box">
    <input type="text" id="doiInput"
      placeholder="e.g. 10.1038/s41586-025-09227-0"
      autocomplete="off" spellcheck="false" />
    <button id="lookupBtn" onclick="runLookup()">Look Up</button>
  </div>

  <div id="status"></div>
  <div id="results"></div>

  <footer>
    <span>Data from CrossRef, PubMed, OpenAlex, Semantic Scholar &amp; others.</span>
    <span><a href="https://github.com/tomlaheyh/doi-lookup" target="_blank">GitHub</a></span>
  </footer>

  <script src="doiLookup.js"></script>
  <script src="pubmedLookup-nonmodule.js"></script>
  <script src="lookup.js"></script>
  <script>
    const input  = document.getElementById('doiInput');
    const btn    = document.getElementById('lookupBtn');
    const status = document.getElementById('status');
    const results = document.getElementById('results');

    // Allow Enter key to trigger lookup
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter') runLookup();
    });

    // Check for ?doi= query parameter on page load
    window.addEventListener('load', () => {
      const params = new URLSearchParams(window.location.search);
      const doiParam = params.get('doi');
      if (doiParam) {
        input.value = doiParam;
        runLookup();
      }
    });

    async function runLookup() {
      const raw = input.value.trim();
      if (!raw) {
        setStatus('Please enter a DOI.', true);
        return;
      }

      // Update URL so it's shareable and scriptable
      const cleanDoi = raw.replace(/^https?:\/\/doi\.org\//i, '').trim();
      history.replaceState(null, '', `?doi=${encodeURIComponent(cleanDoi)}`);

      btn.disabled = true;
      results.innerHTML = '';
      setStatus('<span class="spinner"></span>Looking up DOI — this may take 10–20 seconds while checking all sources…');

      try {
        await handleDOILookup(raw);
        setStatus('');
      } catch (err) {
        setStatus('Lookup failed: ' + err.message, true);
        console.error(err);
      } finally {
        btn.disabled = false;
      }
    }

    function setStatus(msg, isError = false) {
      status.innerHTML = msg;
      status.className = isError ? 'error' : '';
    }

    // Override showDOIModal to render inline instead of as a popup
    const _originalShowDOIModal = typeof showDOIModal === 'function' ? showDOIModal : null;
    window.renderDOIResults = function(html) {
      results.innerHTML = html;
    };
  </script>
</body>
</html>
