<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Research Search Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f4f1eb;
    --surface: #ffffff;
    --surface2: #faf8f4;
    --border: #ddd8ce;
    --ink: #1a1714;
    --ink2: #5a534a;
    --ink3: #9a9088;
    --accent: #005a8c;
    --accent2: #0072b0;
    --accent-light: #e8f2f9;
    --toppick: #1a1714;
    --no-param: #7a8a6a;
    --no-param-bg: #f2f5ee;
    --shadow: 0 2px 12px rgba(0,0,0,0.07);
    --shadow-hover: 0 4px 24px rgba(0,0,0,0.12);
    --radius: 10px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
  }

  /* ─── HEADER ─── */
  header {
    background: var(--ink);
    color: #fff;
    padding: 18px 32px 16px;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 20px rgba(0,0,0,0.25);
  }

  header h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 1.5rem;
    letter-spacing: -0.01em;
    margin-bottom: 14px;
    color: #fff;
  }
  header h1 span {
    color: var(--accent2);
  }

  .search-bar {
    display: flex;
    gap: 10px;
    align-items: center;
  }

  #global-query {
    flex: 1;
    padding: 11px 18px;
    font-family: 'DM Sans', sans-serif;
    font-size: 1rem;
    border: 2px solid transparent;
    border-radius: var(--radius);
    background: rgba(255,255,255,0.12);
    color: #fff;
    outline: none;
    transition: background 0.2s, border-color 0.2s;
  }
  #global-query::placeholder { color: rgba(255,255,255,0.45); }
  #global-query:focus {
    background: rgba(255,255,255,0.18);
    border-color: var(--accent2);
  }

  .clear-btn {
    padding: 10px 16px;
    background: rgba(255,255,255,0.1);
    color: rgba(255,255,255,0.7);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: var(--radius);
    cursor: pointer;
    font-size: 0.85rem;
    font-family: 'DM Sans', sans-serif;
    transition: all 0.15s;
  }
  .clear-btn:hover { background: rgba(255,255,255,0.2); color: #fff; }

  /* ─── LAYOUT ─── */
  main {
    max-width: 900px;
    margin: 0 auto;
    padding: 24px 20px 60px;
  }

  .legend {
    display: flex;
    gap: 20px;
    align-items: center;
    margin-bottom: 10px;
    font-size: 0.78rem;
    color: var(--ink3);
    flex-wrap: wrap;
  }
  .legend-item { display: flex; align-items: center; gap: 6px; }
  .legend-dot {
    width: 10px; height: 10px; border-radius: 50%;
  }
  .legend-dot.top { background: var(--accent); }
  .legend-dot.no-param { background: var(--no-param); }

  /* ─── GROUP CARD ─── */
  .group-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    margin-bottom: 5px;
    overflow: hidden;
    box-shadow: var(--shadow);
    transition: box-shadow 0.2s;
  }
  .group-card:hover { box-shadow: var(--shadow-hover); }

  .group-header {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 8px 18px;
    cursor: pointer;
    user-select: none;
    background: var(--surface);
    transition: background 0.15s;
  }
  .group-header:hover { background: var(--surface2); }

  .group-arrow {
    width: 22px; height: 22px;
    display: flex; align-items: center; justify-content: center;
    border-radius: 5px;
    background: var(--surface2);
    color: var(--ink2);
    font-size: 0.7rem;
    transition: transform 0.2s, background 0.15s;
    flex-shrink: 0;
  }
  .group-card.open .group-arrow {
    transform: rotate(90deg);
    background: var(--accent-light);
    color: var(--accent);
  }

  .group-title {
    font-family: 'DM Serif Display', serif;
    font-size: 0.92rem;
    color: var(--ink);
    flex: 1;
  }

  .group-meta {
    font-size: 0.7rem;
    color: var(--ink3);
    white-space: nowrap;
  }

  /* ─── GROUP BODY ─── */
  .group-body {
    display: none;
    border-top: 1px solid var(--border);
  }
  .group-card.open .group-body { display: block; }

  .group-hint {
    padding: 10px 18px 8px;
    font-size: 0.8rem;
    color: var(--ink3);
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-style: italic;
  }

  .items-grid {
    padding: 12px 18px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
  }

  /* ─── ITEM CHIP ─── */
  .item-chip {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px 6px 8px;
    border: 1.5px solid var(--border);
    border-radius: 8px;
    cursor: pointer;
    font-size: 0.8rem;
    color: var(--ink2);
    background: var(--surface);
    transition: all 0.15s;
    position: relative;
  }
  .item-chip:hover { border-color: var(--accent); color: var(--ink); }
  .item-chip.checked {
    border-color: var(--accent);
    background: var(--accent-light);
    color: var(--ink);
  }
  .item-chip.top-pick { font-weight: 500; }
  .item-chip.top-pick .item-name::before {
    content: '★ ';
    color: var(--accent);
    font-size: 0.7rem;
  }
  .item-chip.no-param {
    border-color: #d5dece;
    color: var(--no-param);
    background: var(--no-param-bg);
  }
  .item-chip.no-param:hover { border-color: var(--no-param); }
  .item-chip.no-param.checked {
    border-color: var(--no-param);
    background: #e6eddf;
  }

  .chip-cb {
    width: 15px; height: 15px;
    border: 1.5px solid var(--border);
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: #fff;
    transition: all 0.12s;
  }
  .item-chip.checked .chip-cb {
    background: var(--accent);
    border-color: var(--accent);
  }
  .item-chip.no-param.checked .chip-cb {
    background: var(--no-param);
    border-color: var(--no-param);
  }
  .chip-cb::after {
    content: '';
    width: 8px; height: 5px;
    border-left: 2px solid #fff;
    border-bottom: 2px solid #fff;
    transform: rotate(-45deg) translateY(-1px);
    display: none;
  }
  .item-chip.checked .chip-cb::after { display: block; }

  .no-param-badge {
    font-size: 0.65rem;
    background: #c8d8b8;
    color: #4a6a3a;
    padding: 1px 5px;
    border-radius: 4px;
    white-space: nowrap;
  }

  /* ─── GROUP FOOTER / SEARCH BTN ─── */
  .group-footer {
    padding: 10px 18px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    gap: 12px;
    border-top: 1px solid var(--border);
  }

  .group-select-actions {
    display: flex;
    gap: 8px;
    font-size: 0.75rem;
    color: var(--ink3);
  }
  .group-select-actions button {
    background: none;
    border: none;
    color: var(--accent);
    cursor: pointer;
    font-size: 0.75rem;
    font-family: 'DM Sans', sans-serif;
    padding: 2px 4px;
    border-radius: 4px;
  }
  .group-select-actions button:hover { background: var(--accent-light); }

  /* ─── CUSTOM SECTIONS ─── */
  .custom-card {
    background: var(--surface);
    border: 2px dashed var(--border);
    border-radius: 12px;
    margin-bottom: 5px;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .custom-card:focus-within { border-color: var(--accent); }

  .custom-header {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 14px 18px;
    cursor: pointer;
    user-select: none;
  }
  .custom-header:hover { background: var(--surface2); }

  .custom-label-wrap {
    flex: 1;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .custom-label-edit {
    font-family: 'DM Serif Display', serif;
    font-size: 1.05rem;
    color: var(--ink);
    border: none;
    background: transparent;
    outline: none;
    cursor: text;
    width: 100%;
  }
  .custom-label-edit:focus { border-bottom: 1.5px solid var(--accent); }

  .custom-ids-row {
    padding: 12px 18px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .custom-ids-input {
    flex: 1;
    padding: 8px 12px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.85rem;
    border: 1.5px solid var(--border);
    border-radius: 7px;
    outline: none;
    background: #fff;
    color: var(--ink);
  }
  .custom-ids-input:focus { border-color: var(--accent); }

  .apply-ids-btn {
    padding: 8px 16px;
    background: var(--ink);
    color: #fff;
    border: none;
    border-radius: 7px;
    cursor: pointer;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    transition: background 0.15s;
  }
  .apply-ids-btn:hover { background: var(--accent); }

  .custom-items-area {
    padding: 12px 18px 6px;
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    min-height: 20px;
  }
  .custom-items-empty {
    font-size: 0.8rem;
    color: var(--ink3);
    font-style: italic;
  }


  /* ─── QUEUE PANEL ─── */
  #queue-panel {
    position: fixed;
    top: 0;
    right: -360px;
    width: 340px;
    height: 100vh;
    background: var(--surface);
    border-left: 2px solid var(--border);
    box-shadow: -4px 0 24px rgba(0,0,0,0.12);
    display: flex;
    flex-direction: column;
    z-index: 500;
    transition: right 0.25s ease;
  }
  #queue-panel.open { right: 0; }

  #queue-panel-header {
    padding: 14px 16px 10px;
    background: var(--ink);
    color: #fff;
    flex-shrink: 0;
    position: relative;
  }
  #queue-panel-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    margin-bottom: 2px;
    padding-right: 24px;
  }
  #queue-panel-subtitle {
    font-size: 0.72rem;
    color: rgba(255,255,255,0.55);
    line-height: 1.4;
  }
  #queue-panel-close {
    position: absolute;
    top: 12px;
    right: 14px;
    background: none;
    border: none;
    color: rgba(255,255,255,0.6);
    font-size: 1.2rem;
    cursor: pointer;
    line-height: 1;
    padding: 2px 4px;
  }
  #queue-panel-close:hover { color: #fff; }

  /* ─── TOAST ─── */
  #toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--ink);
    color: #fff;
    padding: 10px 22px;
    border-radius: 24px;
    font-size: 0.85rem;
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.3s, transform 0.3s;
    z-index: 999;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* ─── SECTION TITLE ─── */
  .section-label {
    font-size: 0.72rem;
    font-weight: 600;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--ink3);
    margin: 22px 0 10px;
  }

  @media (max-width: 600px) {
    header { padding: 18px 14px; }
    main { padding: 16px 12px 60px; }
    .items-grid { padding: 10px 12px; }
    .group-header { padding: 12px 14px; }
    .group-footer { padding: 8px 12px 12px; }
  }

  /* ─── LIVE PANEL ─── */
  .live-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 6px 16px;
    border-bottom: 1px solid #f0ece4;
    font-size: 0.81rem;
    color: var(--ink2);
  }
  .live-row-group {
    font-size: 0.65rem;
    color: var(--ink3);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 80px;
    flex-shrink: 0;
  }
  .live-row-name {
    flex: 1;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .live-row-open {
    width: 22px; height: 22px;
    border: 1.5px solid var(--accent);
    background: var(--accent);
    color: #fff;
    cursor: pointer;
    font-size: 0.78rem;
    flex-shrink: 0;
    border-radius: 4px;
    display: flex; align-items: center; justify-content: center;
    transition: background 0.12s;
  }
  .live-row-open:hover { background: var(--accent2); border-color: var(--accent2); }
  .live-row-open:disabled { opacity: 0.5; cursor: default; }
  .live-row-uncheck {
    width: 18px; height: 18px;
    border: none;
    background: none;
    color: var(--ink3);
    cursor: pointer;
    font-size: 0.8rem;
    flex-shrink: 0;
    border-radius: 3px;
    display: flex; align-items: center; justify-content: center;
    transition: color 0.12s, background 0.12s;
  }
  .live-row-uncheck:hover { color: #cc3300; background: #fde8e4; }

  /* ─── FULL REFERENCE LIST ─── */
  #full-list-section {
    max-width: 900px;
    margin: 32px auto 60px;
  }
  .full-list-toggle-btn {
    display: block;
    width: 100%;
    padding: 11px 18px;
    background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: 10px;
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink2);
    cursor: pointer;
    text-align: left;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .full-list-toggle-btn:hover { border-color: var(--accent); color: var(--accent); }
  .full-list-toggle-btn .toggle-arrow { transition: transform 0.2s; }
  .full-list-toggle-btn.open .toggle-arrow { transform: rotate(90deg); }

  #full-list-content {
    display: none;
    margin-top: 12px;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
  }

  .full-list-copy-bar {
    display: flex;
    justify-content: flex-end;
    padding: 8px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }
  .full-list-copy-btn {
    padding: 5px 14px;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.75rem;
    font-weight: 500;
    border: 1.5px solid var(--border);
    border-radius: 6px;
    background: var(--surface);
    color: var(--ink2);
    cursor: pointer;
    transition: all 0.15s;
  }
  .full-list-copy-btn:hover { border-color: var(--accent); color: var(--accent); }
  .full-list-copy-btn.copied { border-color: #4a8a4a; color: #4a8a4a; }

  #full-list-body {
    max-height: 70vh;
    overflow-y: auto;
    font-family: 'DM Sans', sans-serif;
    font-size: 0.82rem;
    line-height: 1.6;
  }

  .fl-group {
    padding: 14px 18px 10px;
    border-bottom: 1px solid var(--border);
  }
  .fl-group:last-child { border-bottom: none; }
  .fl-group-title {
    font-family: 'DM Serif Display', serif;
    font-size: 1rem;
    color: var(--ink);
    margin-bottom: 8px;
    padding-bottom: 5px;
    border-bottom: 1px solid var(--border);
  }
  .fl-item {
    padding: 5px 0 5px 8px;
    border-left: 2px solid transparent;
    margin-bottom: 4px;
  }
  .fl-item:hover { border-left-color: var(--accent); }
  .fl-item-name {
    font-weight: 500;
    color: var(--ink);
  }
  .fl-item-url {
    color: var(--accent);
    text-decoration: none;
    word-break: break-all;
    font-size: 0.78rem;
  }
  .fl-item-url:hover { text-decoration: underline; }
  .fl-item-desc {
    color: var(--ink3);
    font-size: 0.78rem;
    margin-top: 1px;
  }

  /* Alternating group shades */
  .fl-group:nth-child(odd)  { background: var(--surface); }
  .fl-group:nth-child(even) { background: var(--surface2); }
</style>
</head>
<body>

<header>
  <h1 style="display:flex; align-items:baseline; justify-content:space-between;">
    <span>Research <span>Search Hub</span></span>
    <a href="./index.html" style="font-family:'DM Sans',sans-serif; font-size:0.78rem; font-weight:400; color:rgba(255,255,255,0.6); text-decoration:none; letter-spacing:0.01em; transition:color 0.15s;" onmouseover="this.style.color='rgba(255,255,255,0.95)'" onmouseout="this.style.color='rgba(255,255,255,0.6)'">DOI Lookup →</a>
  </h1>
  <div class="search-bar">
    <input type="text" id="global-query" placeholder="Enter your search term…" autocomplete="off" />
    <button class="clear-btn" onclick="clearQuery()">✕ Clear</button>
  </div>
</header>

<main>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot top"></div> ★ Top Pick (default checked)</div>
    <div class="legend-item"><div class="legend-dot no-param"></div> Opens homepage (no search param)</div>
    <span style="margin-left:auto; font-size:0.75rem; color:var(--ink3)">Selections are saved automatically</span>
  </div>

  <div id="groups-container"></div>

  <div class="section-label">✦ Custom Sections — build your own set by ID</div>
  <div id="custom-container"></div>

  <div id="full-list-section">
    <button class="full-list-toggle-btn" id="full-list-btn" onclick="toggleFullList()">
      <span>✦ Full Reference List — all groups &amp; items</span>
      <span class="toggle-arrow">▶</span>
    </button>
    <div id="full-list-content">
      <div class="full-list-copy-bar">
        <button class="full-list-copy-btn" onclick="copyFullList()">Copy all as text</button>
      </div>
      <div id="full-list-body"></div>
    </div>
  </div>

</main>

<div id="queue-panel">
  <button id="queue-panel-close" onclick="closeQueuePanel()" title="Close">✕</button>
  <div id="queue-panel-header">
    <div id="queue-panel-title">Checked Items</div>
    <div id="queue-panel-subtitle" id="panel-subtitle">Open a group to begin</div>
  </div>

  <div id="live-panel-empty" style="padding:20px 16px; font-size:0.8rem; color:var(--ink3); font-style:italic; display:none;">
    Open a group to see its checked items here.
  </div>
  <div id="live-panel-list" style="flex:1; overflow-y:auto; padding:6px 0;"></div>

</div>

<div id="toast"></div>

<script>

// ── BUILD LOOKUP FROM PERMANENT IDs IN CONFIG ──
// IDs are permanently stamped in RAW_CONFIG. nextId = 335
// When adding new items, assign ids starting from nextId above.
const ITEMS_BY_ID = {};
const GROUPS = RAW_CONFIG.groups.map(g => ({
  ...g,
  items: g.items.map(item => {
    ITEMS_BY_ID[item.id] = { ...item, groupTitle: g.title, groupId: g.groupId };
    return item;
  })
}));

// ── LOCALSTORAGE HELPERS ──
const LS_CHECKS = 'rsh_checks_v1';
const LS_CUSTOM = 'rsh_custom_v1';

function loadChecks() {
  try { return JSON.parse(localStorage.getItem(LS_CHECKS) || '{}'); } catch { return {}; }
}
function saveChecks(checks) {
  localStorage.setItem(LS_CHECKS, JSON.stringify(checks));
}
function loadCustom() {
  try {
    return JSON.parse(localStorage.getItem(LS_CUSTOM) || 'null') || [
      { label: 'My Favorites', ids: '', checkedIds: {} },
      { label: 'Custom Set 2', ids: '', checkedIds: {} }
    ];
  } catch {
    return [
      { label: 'My Favorites', ids: '', checkedIds: {} },
      { label: 'Custom Set 2', ids: '', checkedIds: {} }
    ];
  }
}
function saveCustom(customs) {
  localStorage.setItem(LS_CUSTOM, JSON.stringify(customs));
}

let checksState = loadChecks();
let customState = loadCustom();

// Initialize defaults (first visit only)
GROUPS.forEach(g => g.items.forEach(item => {
  if (!(item.id in checksState)) {
    checksState[item.id] = item.topPick ? true : false;
  }
}));
saveChecks(checksState);

// ── SEARCH LOGIC ──
function getQuery() {
  return document.getElementById('global-query').value.trim();
}
function clearQuery() {
  document.getElementById('global-query').value = '';
  document.getElementById('global-query').focus();
}

function buildUrl(item, q) {
  if (item.searching && q) {
    return item.url + encodeURIComponent(q);
  }
  // No query — use the explicit defaultUrl (a clean landing page, editable per item)
  return item.defaultUrl || item.url;
}



function parseIds(str) {
  return str.split(/[\s,]+/).map(s => parseInt(s.trim())).filter(n => !isNaN(n) && n > 0);
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2200);
}

// ── RENDER GROUPS ──
function renderChip(item, checkState, onChange) {
  const div = document.createElement('div');
  div.className = 'item-chip' +
    (item.topPick ? ' top-pick' : '') +
    (!item.searching ? ' no-param' : '') +
    (checkState ? ' checked' : '');
  div.title = (item.hint || '') + (!item.searching ? '\n⚠ Opens homepage (no search parameter)' : '');

  div.innerHTML = `
    <div class="chip-cb"></div>
    <span class="item-name">${item.title.replace(/^\*/, '')}</span>
    ${!item.searching ? '<span class="no-param-badge">homepage</span>' : ''}
    <span style="font-size:0.65rem;color:var(--ink3);margin-left:2px">#${item.id}</span>
  `;

  div.addEventListener('click', () => {
    const newState = !checkState;
    checkState = newState;
    onChange(item.id, newState);
    div.classList.toggle('checked', newState);
    refreshLivePanel();
  });

  return div;
}

function renderGroups() {
  const container = document.getElementById('groups-container');
  GROUPS.forEach(group => {
    const card = document.createElement('div');
    card.className = 'group-card';

    const checkedCount = () => group.items.filter(i => checksState[i.id]).length;

    card.innerHTML = `
      <div class="group-header">
        <div class="group-arrow">▶</div>
        <div class="group-title">${group.title}</div>
        <div class="group-meta" id="meta-${group.groupId}">${checkedCount()} / ${group.items.length} selected</div>
      </div>
      <div class="group-body">
        ${group.hint ? `<div class="group-hint">${group.hint}</div>` : ''}
        <div class="items-grid" id="grid-${group.groupId}"></div>
        <div class="url-list-view" id="urlview-${group.groupId}" style="display:none;">
          <div class="url-list-toolbar">
            <span class="url-list-label">Checked items</span>
            <button class="copy-names-btn" onclick="copyNames(${group.groupId})">Copy names</button>
          </div>
          <ul class="url-list-links" id="urllist-${group.groupId}"></ul>
        </div>
        <div class="group-footer">
          <div class="group-select-actions">
            <button onclick="selectAll(${group.groupId})">All</button>
            <button onclick="selectNone(${group.groupId})">None</button>
            <button onclick="selectTopPicks(${group.groupId})">Top Picks</button>
            <button onclick="toggleUrlView(${group.groupId})" id="urlviewbtn-${group.groupId}">Show URLs</button>
          </div>

        </div>
      </div>
    `;

    // Toggle
    card.querySelector('.group-header').addEventListener('click', (e) => {
      if (e.target.closest('button')) return;
      const isOpen = card.classList.toggle('open');
      activeGroupId = isOpen ? group.groupId : null;
      refreshLivePanel();
    });

    // Render chips
    const grid = card.querySelector(`#grid-${group.groupId}`);
    group.items.forEach(item => {
      const chip = renderChip(item, checksState[item.id], (id, val) => {
        checksState[id] = val;
        saveChecks(checksState);
        updateMeta(group.groupId, group.items);
      });
      grid.appendChild(chip);
    });

    container.appendChild(card);
  });
}


function updateMeta(groupId, items) {
  const el = document.getElementById(`meta-${groupId}`);
  if (el) el.textContent = `${items.filter(i => checksState[i.id]).length} / ${items.length} selected`;
}

function selectAll(groupId) {
  const group = GROUPS.find(g => g.groupId === groupId);
  if (!group) return;
  group.items.forEach(i => { checksState[i.id] = true; });
  saveChecks(checksState);
  refreshGroupChips(groupId, group.items);
  updateMeta(groupId, group.items);
}
function selectNone(groupId) {
  const group = GROUPS.find(g => g.groupId === groupId);
  if (!group) return;
  group.items.forEach(i => { checksState[i.id] = false; });
  saveChecks(checksState);
  refreshGroupChips(groupId, group.items);
  updateMeta(groupId, group.items);
}
function selectTopPicks(groupId) {
  const group = GROUPS.find(g => g.groupId === groupId);
  if (!group) return;
  group.items.forEach(i => { checksState[i.id] = i.topPick; });
  saveChecks(checksState);
  refreshGroupChips(groupId, group.items);
  updateMeta(groupId, group.items);
}
function refreshGroupChips(groupId, items) {
  const grid = document.getElementById(`grid-${groupId}`);
  if (!grid) return;
  grid.innerHTML = '';
  const group = GROUPS.find(g => g.groupId === groupId);
  items.forEach(item => {
    const chip = renderChip(item, checksState[item.id], (id, val) => {
      checksState[id] = val;
      saveChecks(checksState);
      updateMeta(groupId, group.items);
    });
    grid.appendChild(chip);
  });
}

// ── RENDER CUSTOM SECTIONS ──
function renderCustomSections() {
  const container = document.getElementById('custom-container');
  customState.forEach((custom, ci) => {
    const card = document.createElement('div');
    card.className = 'custom-card';
    card.id = `custom-card-${ci}`;

    card.innerHTML = `
      <div class="custom-header">
        <div class="group-arrow" id="custom-arrow-${ci}">▶</div>
        <div class="custom-label-wrap">
          <input class="custom-label-edit" value="${custom.label}" placeholder="Section name…" id="custom-label-${ci}" />
        </div>
        <div class="group-meta" id="custom-meta-${ci}">0 items</div>
      </div>
      <div class="group-body" id="custom-body-${ci}">
        <div class="custom-ids-row">
          <input class="custom-ids-input" id="custom-ids-${ci}"
            value="${custom.ids}"
            placeholder="Enter item IDs: e.g.  1, 5, 23, 47, 102" />
          <button class="apply-ids-btn" onclick="applyCustomIds(${ci})">Apply</button>
        </div>
        <div class="custom-items-area" id="custom-items-${ci}">
          <span class="custom-items-empty">Enter IDs above and click Apply to populate this section.</span>
        </div>
        <div class="group-footer">
          <div class="group-select-actions">
            <button onclick="selectAllCustom(${ci})">All</button>
            <button onclick="selectNoneCustom(${ci})">None</button>
          </div>

        </div>
      </div>
    `;

    // Toggle
    card.querySelector('.custom-header').addEventListener('click', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.closest('button')) return;
      const body = document.getElementById(`custom-body-${ci}`);
      const arrow = document.getElementById(`custom-arrow-${ci}`);
      const isOpen = body.style.display === 'block';
      body.style.display = isOpen ? 'none' : 'block';
      arrow.style.transform = isOpen ? '' : 'rotate(90deg)';
    });

    // Save label
    const labelInput = card.querySelector(`#custom-label-${ci}`);
    labelInput.addEventListener('input', () => {
      customState[ci].label = labelInput.value;
      saveCustom(customState);
    });
    labelInput.addEventListener('click', e => e.stopPropagation());

    container.appendChild(card);

    // Pre-populate if ids exist
    if (custom.ids) applyCustomIds(ci, true);
  });
}

function applyCustomIds(ci, silent) {
  const idsInput = document.getElementById(`custom-ids-${ci}`);
  const str = idsInput ? idsInput.value : customState[ci].ids;
  customState[ci].ids = str;
  saveCustom(customState);

  const ids = parseIds(str);
  const area = document.getElementById(`custom-items-${ci}`);
  const meta = document.getElementById(`custom-meta-${ci}`);
  if (!area) return;
  area.innerHTML = '';

  const found = ids.map(id => ITEMS_BY_ID[id]).filter(Boolean);
  if (!found.length) {
    area.innerHTML = '<span class="custom-items-empty">No valid IDs found. Check the # numbers shown on each item chip.</span>';
    if (meta) meta.textContent = '0 items';
    return;
  }

  // Ensure checkedIds exist for new items
  found.forEach(item => {
    if (!(item.id in customState[ci].checkedIds)) {
      customState[ci].checkedIds[item.id] = true;
    }
  });
  saveCustom(customState);

  found.forEach(item => {
    const chip = document.createElement('div');
    const isChecked = customState[ci].checkedIds[item.id] !== false;
    chip.className = 'item-chip' +
      (item.topPick ? ' top-pick' : '') +
      (!item.searching ? ' no-param' : '') +
      (isChecked ? ' checked' : '');
    chip.title = (item.hint || '') +
      `\nGroup: ${item.groupTitle}` +
      (!item.searching ? '\n⚠ Opens homepage (no search parameter)' : '');

    chip.innerHTML = `
      <div class="chip-cb"></div>
      <span class="item-name">${item.title.replace(/^\*/, '')}</span>
      ${!item.searching ? '<span class="no-param-badge">homepage</span>' : ''}
      <span style="font-size:0.65rem;color:var(--ink3)">#${item.id}</span>
    `;

    let checked = isChecked;
    chip.addEventListener('click', () => {
      checked = !checked;
      customState[ci].checkedIds[item.id] = checked;
      saveCustom(customState);
      chip.classList.toggle('checked', checked);
      updateCustomMeta(ci, found);
    });

    area.appendChild(chip);
  });

  updateCustomMeta(ci, found);
  if (!silent) showToast(`Loaded ${found.length} item${found.length !== 1 ? 's' : ''}`);
}

function updateCustomMeta(ci, items) {
  const meta = document.getElementById(`custom-meta-${ci}`);
  if (!meta || !items) return;
  const checkedCount = items.filter(i => customState[ci].checkedIds[i.id] !== false).length;
  meta.textContent = `${checkedCount} / ${items.length} items`;
}

function selectAllCustom(ci) {
  const ids = parseIds(customState[ci].ids);
  ids.forEach(id => { customState[ci].checkedIds[id] = true; });
  saveCustom(customState);
  applyCustomIds(ci, true);
}
function selectNoneCustom(ci) {
  const ids = parseIds(customState[ci].ids);
  ids.forEach(id => { customState[ci].checkedIds[id] = false; });
  saveCustom(customState);
  applyCustomIds(ci, true);
}


// ── URL LIST VIEW ──
function buildUrlList(groupId) {
  const group = GROUPS.find(g => g.groupId === groupId);
  if (!group) return;
  const q = getQuery();
  const ul = document.getElementById(`urllist-${groupId}`);
  if (!ul) return;
  ul.innerHTML = '';
  const checked = group.items.filter(item => checksState[item.id]);
  if (!checked.length) {
    ul.innerHTML = '<li class="url-list-empty">No items checked in this group.</li>';
    return;
  }
  checked.forEach(item => {
    const url = buildUrl(item, q);
    const name = item.title.replace(/^\*/, '');
    const li = document.createElement('li');
    li.innerHTML = `<a href="${url}" target="_blank" rel="noopener noreferrer">${name}</a>`;
    ul.appendChild(li);
  });
}

function toggleUrlView(groupId) {
  const view = document.getElementById(`urlview-${groupId}`);
  const grid = document.getElementById(`grid-${groupId}`);
  const btn = document.getElementById(`urlviewbtn-${groupId}`);
  if (!view || !grid || !btn) return;
  const isActive = view.classList.contains('active');
  if (isActive) {
    // Switch back to chips
    view.classList.remove('active');
    view.style.display = 'none';
    grid.style.display = 'flex';
    btn.textContent = 'Show URLs';
  } else {
    // Switch to URL list
    buildUrlList(groupId);
    view.classList.add('active');
    view.style.display = 'block';
    grid.style.display = 'none';
    btn.textContent = 'Show Items';
  }
}

function copyNames(groupId) {
  const group = GROUPS.find(g => g.groupId === groupId);
  if (!group) return;
  const checked = group.items.filter(item => checksState[item.id]);
  const names = checked.map(item => item.title.replace(/^\*/, '')).join('\n');
  navigator.clipboard.writeText(names).then(() => {
    const btn = document.querySelector(`#urlview-${groupId} .copy-names-btn`);
    if (btn) {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy names';
        btn.classList.remove('copied');
      }, 2000);
    }
  });
}


// ── LIVE PANEL ──
function refreshLivePanel() {
  const listEl = document.getElementById('live-panel-list');
  const emptyEl = document.getElementById('live-panel-empty');
  const panel = document.getElementById('queue-panel');
  if (!listEl) return;

  const q = getQuery();

  // Collect checked items from the active group only
  const checkedItems = [];
  if (activeGroupId !== null) {
    const activeGroup = GROUPS.find(g => g.groupId === activeGroupId);
    if (activeGroup) {
      activeGroup.items.forEach(item => {
        if (checksState[item.id]) {
          checkedItems.push({ item, groupTitle: activeGroup.title });
        }
      });
    }
  }

  listEl.innerHTML = '';

  if (!checkedItems.length) {
    emptyEl.style.display = 'block';
    listEl.style.display = 'none';
    panel.classList.remove('open');
    return;
  }

  emptyEl.style.display = 'none';
  listEl.style.display = 'block';

  checkedItems.forEach(({ item, groupTitle }) => {
    const row = document.createElement('div');
    row.className = 'live-row';
    const name = item.title.replace(/^\*/, '');
    const url = buildUrl(item, q);
    row.innerHTML = `
      <span class="live-row-group" title="${groupTitle}">${groupTitle}</span>
      <span class="live-row-name" title="${name}">${name}</span>
      <button class="live-row-open" title="Open ${name}" onclick="openLiveItem(this, '${url.replace(/'/g, "\'")}')">→</button>
      <button class="live-row-uncheck" title="Uncheck ${name}" onclick="uncheckItem(${item.id})">✕</button>
    `;
    listEl.appendChild(row);
  });

  // Update panel title to show active group
  const titleEl = document.getElementById('queue-panel-title');
  const subtitleEl = document.getElementById('queue-panel-subtitle');
  if (activeGroupId !== null) {
    const activeGroup = GROUPS.find(g => g.groupId === activeGroupId);
    if (titleEl && activeGroup) titleEl.textContent = activeGroup.title;
    if (subtitleEl) subtitleEl.textContent = checkedItems.length
      ? `${checkedItems.length} item${checkedItems.length !== 1 ? 's' : ''} checked · Click → to open · ✕ to uncheck`
      : 'No items checked in this group';
    panel.classList.add('open');
  } else {
    if (titleEl) titleEl.textContent = 'Checked Items';
    if (subtitleEl) subtitleEl.textContent = 'Open a group to begin';
    panel.classList.remove('open');
  }
}

function openLiveItem(btn, url) {
  const newWin = window.open(url, '_blank');
  if (newWin) newWin.blur();
  window.focus();
  // Mark row as opened
  btn.textContent = '✓';
  btn.style.color = 'var(--accent)';
  btn.style.borderColor = 'var(--accent)';
  btn.disabled = true;
  btn.closest('.live-row').style.opacity = '0.5';
  // Move focus to next undone open button
  const allBtns = [...document.querySelectorAll('.live-row-open')].filter(b => !b.disabled);
  if (allBtns.length) allBtns[0].focus();
}

function uncheckItem(id) {
  checksState[id] = false;
  saveChecks(checksState);
  // Refresh the chip in whichever group it belongs to
  const itemData = ITEMS_BY_ID[id];
  if (itemData) {
    const group = GROUPS.find(g => g.groupId === itemData.groupId);
    if (group) {
      refreshGroupChips(group.groupId, group.items);
      updateMeta(group.groupId, group.items);
    }
  }
  refreshLivePanel();
}

// ── ACTIVE GROUP TRACKING ──
let activeGroupId = null;


// ── FULL REFERENCE LIST ──
const GROUP_COLORS = [
  '#f8f4f0','#f4f8f4','#f4f6f8','#f8f8f4','#f8f4f8',
  '#f4f8f8','#f8f6f4','#f4f4f8','#f8f8f8','#f4f8f6',
  '#f8f4f4','#f6f8f4','#f4f6f4','#f8f6f8'
];

function toggleFullList() {
  const btn = document.getElementById('full-list-btn');
  const content = document.getElementById('full-list-content');
  const body = document.getElementById('full-list-body');
  const isOpen = btn.classList.contains('open');

  if (isOpen) {
    btn.classList.remove('open');
    content.style.display = 'none';
  } else {
    btn.classList.add('open');
    content.style.display = 'block';
    if (!body.hasChildNodes()) buildFullList();
  }
}

function buildFullList() {
  const body = document.getElementById('full-list-body');
  body.innerHTML = '';

  GROUPS.forEach((group, gi) => {
    const section = document.createElement('div');
    section.className = 'fl-group';
    section.style.background = GROUP_COLORS[gi % GROUP_COLORS.length];

    const title = document.createElement('div');
    title.className = 'fl-group-title';
    title.textContent = group.title;
    section.appendChild(title);

    group.items.forEach(item => {
      const name = item.title.replace(/^\*/, '');
      const url = item.defaultUrl || item.url;

      const row = document.createElement('div');
      row.className = 'fl-item';
      row.innerHTML = `
        <div class="fl-item-name">${name} <span style="font-size:0.68rem;color:var(--ink3);font-weight:400;">#${item.id}</span></div>
        <div><a class="fl-item-url" href="${url}" target="_blank" rel="noopener noreferrer">${url}</a></div>
        <div class="fl-item-desc">${item.hint || ''}</div>
      `;
      section.appendChild(row);
    });

    body.appendChild(section);
  });
}

function copyFullList() {
  const lines = [];
  GROUPS.forEach(group => {
    lines.push('═══ ' + group.title + ' ═══');
    group.items.forEach(item => {
      const name = item.title.replace(/^\*/, '');
      const url = item.defaultUrl || item.url;
      lines.push(name);
      lines.push(url);
      if (item.hint) lines.push(item.hint);
      lines.push('');
    });
    lines.push('');
  });

  navigator.clipboard.writeText(lines.join('\n')).then(() => {
    const btn = document.querySelector('.full-list-copy-btn');
    if (btn) {
      btn.textContent = '✓ Copied!';
      btn.classList.add('copied');
      setTimeout(() => {
        btn.textContent = 'Copy all as text';
        btn.classList.remove('copied');
      }, 2500);
    }
  });
}
// ── INIT ──
renderGroups();
renderCustomSections();
refreshLivePanel();

// Enter key triggers... nothing globally (user picks which group to search)
document.getElementById('global-query').addEventListener('keydown', e => {
  if (e.key === 'Enter') showToast('Select a group\'s Search button to open tabs.');
});
